# 1. Conexión a la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/verodata_db
spring.datasource.username=postgres
# IMPORTANTE: Cambia '1234' por la contraseña que pusiste al instalar PostgreSQL
spring.datasource.password=admin12345
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuración de Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Evitar bloqueos iniciales de Spring Security
spring.main.allow-bean-definition-overriding=true
# Cambiar el puerto de la aplicación para evitar choques
server.port=8081